<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>News & Blog — T. Yang Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-white text-slate-800">
<div id="site-nav"></div>

<header class="max-w-6xl mx-auto px-6 pt-16 pb-8">
  <p class="text-sm tracking-widest uppercase text-slate-500 mb-4">02 — News & Blog</p>
  	<section class="border-b border-slate-200">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-4 pb-8 sm:pb-12">

    <!-- Hero box: tall on mobile, wide on desktop -->
    <div class="relative overflow-hidden rounded-lg
                min-h-[20rem] sm:min-h-0 sm:aspect-[7/2]">

      <!-- Background image -->
      <div class="absolute inset-0 z-0">
        <img src="images/hero-banner.png"
             alt=""
             class="w-full h-full object-cover object-center" />
        <!-- Stronger overlay on mobile for readability -->
        <div class="absolute inset-0 bg-white/80 sm:bg-white/70"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-white via-white/80 to-white/40"></div>
      </div>

      <!-- Foreground text -->
      <div class="relative z-10 h-full flex items-center
                  px-5 py-8 sm:px-8 md:px-12 sm:py-0">
        <div class="max-w-xl">
          <h1 class="font-serif text-3xl sm:text-4xl md:text-5xl
                     text-slate-900 leading-tight mb-3 sm:mb-4">
            What's new?
          </h1>
          <p class="text-base sm:text-lg text-slate-700 leading-relaxed
                    mb-5 sm:mb-6">
            Updates from the lab, paper announcements, and occasional commentary.
          </p>
          
        </div>
      </div>

    </div>
  </div>
</section>
</header>

<section class="max-w-5xl mx-auto px-6 py-16">
  <div id="news-filters" class="flex flex-wrap gap-2 mb-10"></div>
  <div id="news-list" class="grid gap-5"></div>
</section>

<div id="site-footer"></div>
<script src="data/news-data.js"></script>
<script src="js/news.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
</body>
</html>
