<!DOCTYPE html>
<html lang="en">
<head>

<title>Publications — T. Yang Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<body class="bg-slate-50 text-slate-900">
<div id="site-nav"></div>

<header class="max-w-6xl mx-auto px-6 pt-16 pb-8">
  <p class="text-sm tracking-widest uppercase text-slate-500 mb-4">03 — Publications</p>
  	<!-- Hero -->
	
	<!-- Constrained hero box -->
	<div class="relative overflow-hidden rounded-lg aspect-[7/2]">
	
	  <!-- Background image -->
	  <div class="absolute inset-0 z-0">
		<img src="images/hero-banner.png"
			 alt=""
			 class="w-full h-full object-cover" />
		<div class="absolute inset-0 bg-white/70"></div>
		<div class="absolute inset-0 bg-gradient-to-r from-white via-white/80 to-white/40"></div>

		  </h1>
		  <p class="text-xl text-slate-700 leading-relaxed mb-8">

		  </p>
		</div>

<div id="site-footer"></div>
